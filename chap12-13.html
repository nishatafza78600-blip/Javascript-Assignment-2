    <script>
        

// -------chp 12 to 13

// 1
let input = prompt("Enter a character (number):");
let charCode = input.charCodeAt(0);

if (charCode >= 48 && charCode <= 57) {
    console.log("The input is a Number.");
} else if (charCode >= 65 && charCode <= 90) {
    console.log("The input is an Uppercase letter.");
} else if (charCode >= 97 && charCode <= 122) {
    console.log("The input is a Lowercase letter.");
} else {
    console.log("The input is a special character or symbol.");
}



// 2

var num1 = parseInt(prompt("Enter first integer:"));
var num2 = parseInt(prompt("Enter second integer:"));

if (num1 > num2) {
    console.log(num1 + " is larger.");
} else if (num2 > num1) {
    console.log(num2 + " is larger.");
} else {
    console.log("Both integers are equal.");
}

// 3
let number = parseFloat(prompt("Enter a number:"));

if (number > 0) {
    console.log("The number is positive.");
} else if (number < 0) {
    console.log("The number is negative.");
} else {
    console.log("The number is zero.");
}

4

    console.log(true);
} else {
    console.log(false); 
}

else {

}
