    <script>
        

// chap 17 to 20

// 1.
let matrix = [];


for (let i = 0; i < 3; i++) {

    matrix[i] = []; 
    
    for (let j = 0; j < 3; j++) {
   
        matrix[i][j] = `Row ${i} Col ${j}`;
    }
}

console.log(matrix);


// 2.


let matrixs = [
  [0,1,2,3],
  [1,0,1,2],
  [2,1,0,1],
];


console.log(matrixs);

// 3.

for(var i = 1 ; i  <= 10 ; i++){
  document.writeln(i + "<br>")
}
 
// 4.


const fruits = ["apple", "banana", "mango", "orange", "strawberry"];

for (let i = 0; i < fruits.length; i++) {

    document.writeln(fruits[i] + "<br>");
}

for (let i = 0; i < fruits.length; i++) {
    document.writeln("Element at index " + i + " is " + fruits[i] + "<br>");
}

//  5.

var table = prompt("Enter a number to show its multiplication table:");
var Length = prompt("Enter length of multiplication table:");


var eArray = [];

for (var i = 1; i <= Length; i++) {
    eArray.push(table * i);
}


 document.writeln("<h3>Multiplication table of " + table + "</h3>");
 document.writeln("<h3>Length " + Length + "</h3><br>");

for (var j = 0; j < eArray.length; j++) {
 
    document.writeln(table + " x " + (j + 1) + " = " + eArray[j] + "<br>");
}


// 6

// a)
var counting =  [];

for( let i = 1 ; i <= 15 ; i++){
  counting.push(i);
}

document.writeln("counting:" + counting.join(", ") + "<br>")

// b)
let reverse = [];

for (let i = 10; i >= 1; i--) {
    reverse.push(i);
}
document.writeln("Reverse counting: " + reverse.join(", ") + "<br>");

// c)
let even = [];
for (let i = 0; i <= 20; i += 2) {
    even.push(i);
}
document.writeln("Even: " + even.join(", ") + "<br>");

// d)
let odd = [];
for (let i = 1; i <= 19; i += 2) {
    odd.push(i);
}
document.writeln("Odd: " + odd.join(", ") + "<br>");

// e)
let series = [];
for (let i = 2; i <= 20; i += 2) {
    series.push(i + "k");
}
document.writeln("Series: " + series.join(", ") + "<br>");
    </script>
